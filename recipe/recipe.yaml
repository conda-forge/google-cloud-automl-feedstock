schema_version: 1

context:
  name: google-cloud-automl
  version: "2.19.0"

package:
  name: ${{ name|lower }}
  version: ${{ version }}

source:
  url: https://pypi.org/packages/source/${{ name[0] }}/${{ name }}/google_cloud_automl-${{ version }}.tar.gz
  sha256: c7267b59a7eff7b15207fe68689ebb3fb9226a7e272ff13bf2750bf6871458ce

build:
  number: 0
  noarch: python
  script: ${{ PYTHON }} -m pip install . --no-deps --no-build-isolation -vv

requirements:
  host:
    - python ${{ python_min }}.*
    - pip
    - setuptools
  run:
    - python >=${{ python_min }}
    - google-api-core >=2.11.0,<3.0.0
    - google-api-core-grpc
    - google-auth >=2.14.1,<3.0.0,!=2.24.0,!=2.25.0
    # more restrictive constraint for python >=3.14
    - grpcio >=1.75.1,<2.0.0
    # more restrictive constraint for python >=3.13
    - proto-plus >=1.25.0,<2.0.0
    - protobuf >=4.25.8,<8.0.0

tests:
  - python:
      imports:
        - grpc
        - google.cloud.automl
      python_version: ${{ python_min }}.*
      pip_check: true

about:
  summary: Google Cloud Automl API client library
  license: Apache-2.0
  license_file: LICENSE
  description: "Google Cloud AutoML API is a suite of machine learning products that enables developers with limited machine learning expertise to train high-quality models specific to their business needs, by leveraging Google’s state-of-the-art transfer learning, and Neural Architecture Search technology.\nSee the [quick::
    - start guide](https://googleapis.dev/python/automl/latest/index.html#quick-start)."
  homepage: https://github.com/googleapis/google-cloud-python/tree/main/packages/google-cloud-automl
  repository: https://github.com/googleapis/google-cloud-python/tree/main/packages/google-cloud-automl
  documentation: https://googleapis.dev/python/automl/latest/index.html

extra:
  recipe-maintainers:
    - parthea
    - xylar
